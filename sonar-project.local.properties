# =====================================================
# SonarQube LOCAL (Docker self-hosted) - Frontend
# =====================================================
# Este archivo se usa cuando se ejecuta scripts/Run-LocalSonar.ps1
# Apunta a los projectKeys del SonarQube Community local, distintos
# a los de SonarCloud (que viven en sonar-project.properties).
#
sonar.projectKey=entangle-frontend
sonar.projectName=entangle-frontend

# --- Codigo fuente y exclusiones (igual que Cloud) ---
sonar.sources=src
sonar.tests=src/test

# Solo analiza JS/JSX. CSS, Module.css, JSON, MD, etc no se incluyen
# en la metrica de cobertura ni en el analisis de calidad.
sonar.inclusions=**/*.js,**/*.jsx

sonar.exclusions=\
    **/node_modules/**,\
    **/dist/**,\
    **/build/**,\
    **/coverage/**,\
    **/*.config.js,\
    **/*.config.cjs,\
    **/*.config.mjs,\
    public/**,\
    scripts/**,\
    docs/**,\
    src/main.jsx,\
    src/i18n/**,\
    src/data/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusiones de cobertura: alineadas con vite.config.js.
# Solo se mide cobertura de la logica de negocio (services, store, hooks).
# El resto (3D, Dashboard UI, header/footer visuales, bootstrap) se valida visualmente.
sonar.coverage.exclusions=\
    src/App.jsx,\
    src/main.jsx,\
    src/components/Universe/**/*.js,\
    src/components/Universe/**/*.jsx,\
    src/components/Dashboard/**/*.jsx,\
    src/components/QuantumBackground.jsx,\
    src/components/QuantumDivider.jsx,\
    src/components/BlochSphere.jsx,\
    src/components/EntanglementLines.jsx,\
    src/components/WavefunctionCollapse.jsx,\
    src/components/LanguageSelector.jsx,\
    src/components/BackendStatusBadge.jsx,\
    src/components/LastUpdatedBadge.jsx,\
    src/components/BellCircuit.jsx,\
    src/components/FooterExtra.jsx,\
    src/components/TaglineRotator.jsx,\
    src/components/LogoQuantumParticles.jsx,\
    src/components/Tooltip.jsx,\
    src/i18n/**,\
    src/data/**,\
    src/assets/**,\
    src/test/**,\
    **/*.test.js,\
    **/*.test.jsx,\
    **/*.spec.js,\
    **/*.spec.jsx

sonar.test.inclusions=**/*.test.{js,jsx},**/*.spec.{js,jsx}

sonar.sourceEncoding=UTF-8
