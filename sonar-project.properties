# =====================================================
# SonarCloud configuration - Entangle Visualizer (Frontend)
# =====================================================
sonar.projectKey=Angel-TFG-UCLM_Entangle-Visualizer
sonar.organization=angel-tfg-uclm
sonar.projectName=entangle-frontend

# --- Codigo fuente y exclusiones ---
sonar.sources=src
sonar.tests=src/test

# Solo analiza JS/JSX (CSS no se mide cobertura)
sonar.inclusions=**/*.js,**/*.jsx

# Excluimos build, deps, mocks, datos estaticos y escena 3D no testeable
sonar.exclusions=\
    **/node_modules/**,\
    **/dist/**,\
    **/build/**,\
    **/coverage/**,\
    **/*.config.js,\
    **/*.config.cjs,\
    **/*.config.mjs,\
    public/**,\
    scripts/**,\
    docs/**,\
    src/main.jsx,\
    src/i18n/**,\
    src/data/**

# Cobertura: vitest --coverage genera coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusiones de cobertura: alineadas con vite.config.js.
# Solo se mide cobertura de la logica de negocio (services, store, hooks).
# El resto (3D, Dashboard UI, header/footer visuales, bootstrap) se valida visualmente.
sonar.coverage.exclusions=\
    src/App.jsx,\
    src/main.jsx,\
    src/components/Universe/**/*.js,\
    src/components/Universe/**/*.jsx,\
    src/components/Dashboard/**/*.jsx,\
    src/components/QuantumBackground.jsx,\
    src/components/QuantumDivider.jsx,\
    src/components/BlochSphere.jsx,\
    src/components/EntanglementLines.jsx,\
    src/components/WavefunctionCollapse.jsx,\
    src/components/LanguageSelector.jsx,\
    src/components/BackendStatusBadge.jsx,\
    src/components/LastUpdatedBadge.jsx,\
    src/components/BellCircuit.jsx,\
    src/components/FooterExtra.jsx,\
    src/components/TaglineRotator.jsx,\
    src/components/LogoQuantumParticles.jsx,\
    src/components/Tooltip.jsx,\
    src/store/dashboardStore.js,\
    src/i18n/**,\
    src/data/**,\
    src/assets/**,\
    src/test/**,\
    **/*.test.js,\
    **/*.test.jsx,\
    **/*.spec.js,\
    **/*.spec.jsx

sonar.test.inclusions=**/*.test.{js,jsx},**/*.spec.{js,jsx}

# ============================================================
# Issue suppressions (multi-criteria rules)
# ============================================================
# javascript:S2245 (Math.random insecurity) NO aplica a contextos visuales:
# todas las animaciones del universo 3D, canvas overlays, particle systems
# y backgrounds quanticos usan Math.random para variabilidad estetica.
# No hay datos sensibles, no se generan tokens, IDs unicos ni claves.
# javascript:S1082 (keyboard listener on click handlers) NO aplica a la
# escena 3D del universo: los elementos clickables internos son meshes
# WebGL/canvas que NO son focusable por teclado; la accesibilidad por
# teclado se gestiona via los hotkeys globales (ESC, Tab, flechas...)
# que escucha el componente raiz UniverseView en window.keydown.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8

sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S2245
sonar.issue.ignore.multicriteria.e1.resourceKey=src/components/Universe/**/*

sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S2245
sonar.issue.ignore.multicriteria.e2.resourceKey=src/components/QuantumBackground.jsx

sonar.issue.ignore.multicriteria.e3.ruleKey=javascript:S2245
sonar.issue.ignore.multicriteria.e3.resourceKey=src/components/QuantumDivider.jsx

sonar.issue.ignore.multicriteria.e4.ruleKey=javascript:S2245
sonar.issue.ignore.multicriteria.e4.resourceKey=src/components/Dashboard/NetworkGraph.jsx

sonar.issue.ignore.multicriteria.e5.ruleKey=javascript:S2245
sonar.issue.ignore.multicriteria.e5.resourceKey=src/components/Dashboard/CollaborationPanel.jsx

sonar.issue.ignore.multicriteria.e6.ruleKey=javascript:S1082
sonar.issue.ignore.multicriteria.e6.resourceKey=src/components/Universe/**/*

sonar.issue.ignore.multicriteria.e7.ruleKey=javascript:S1082
sonar.issue.ignore.multicriteria.e7.resourceKey=src/components/Dashboard/CollaborationPanel.jsx

sonar.issue.ignore.multicriteria.e8.ruleKey=javascript:S1082
sonar.issue.ignore.multicriteria.e8.resourceKey=src/components/LanguageSelector.jsx

sonar.sourceEncoding=UTF-8
